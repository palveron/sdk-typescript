name: Publish to npm

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Run tests
        run: npm test --if-present

      - name: Verify no vexis remnants
        run: |
          if grep -rIni "vexis\|disruptivetrends\|vx_live\|vx_test\|gp_live\|gp_test\|x-vexis-" src/ dist/ README.md CHANGELOG.md package.json LICENSE 2>/dev/null; then
            echo "ERROR: Found vexis remnants in publishable files."
            exit 1
          fi
          echo "Clean — no vexis remnants found."

      - name: Publish to npm with provenance
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
